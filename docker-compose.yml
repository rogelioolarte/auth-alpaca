x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    container_name: auth-alpaca-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: auth-alpaca
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d auth-alpaca"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  backend:
    build: ./backend
    container_name: auth-alpaca-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 50
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 10
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 30000
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_OAUTH2_REDIRECT_URI: ${APP_OAUTH2_REDIRECT_URI}
      APP_FRONTEND_URI: ${APP_FRONTEND_URI}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MAX_SESSIONS_PER_USER: ${MAX_SESSIONS_PER_USER}
      INFINITY_LOGIN: ${INFINITY_LOGIN}
    ports:
      # Expuesto temporalmente para pruebas locales. 
      # Se eliminará o restringirá a 127.0.0.1 cuando Nginx entre en escena.
      - "8080:8080" 
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    networks:
      - backend-net
      - frontend-net
    logging: *default-logging

  frontend:
    build: ./frontend
    container_name: auth-alpaca-ui
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Ajustado a 80:8080 asumiendo que el contenedor expone el puerto 80 (típico en Nginx).
      # Si tu Dockerfile de Angular expone 8080 internamente, cámbialo a "80:8080".
      - "80:8080" 
    environment:
      - API_BASE_URL=${API_BASE_URL}
    networks:
      - frontend-net
    logging: *default-logging

networks:
  backend-net:
    internal: true # Excelente práctica: aísla la BD del exterior
  frontend-net:

volumes:
  postgres_data:
