<mat-sidenav-container class="dashboard-container">
  @if (isInDashboard()) {
    <mat-sidenav mode="side" [opened]="sidenavOpened()" class="dashboard-sidenav">
      <div class="sidenav-header">
        <h2>Dashboard</h2>
      </div>
      <mat-nav-list>
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>
        <a mat-list-item routerLink="/dashboard/profile" routerLinkActive="active">
          <mat-icon matListItemIcon>person</mat-icon>
          <span matListItemTitle>My Profile</span>
        </a>
        <a mat-list-item routerLink="/dashboard/advertiser" routerLinkActive="active">
          <mat-icon matListItemIcon>campaign</mat-icon>
          <span matListItemTitle>My Advertiser</span>
        </a>
        <a mat-list-item [routerLink]="['/advertisers/', myPublicAdvertiserId()]" target="_blank">
          <mat-icon matListItemIcon>public</mat-icon>
          <span matListItemTitle>Public Site</span>
        </a>

        @if (isAdmin()) {
          <a mat-list-item routerLink="/dashboard/permissions" routerLinkActive="active">
            <mat-icon matListItemIcon>lock</mat-icon>
            <span matListItemTitle>Permissions</span>
          </a>
          <a mat-list-item routerLink="/dashboard/roles" routerLinkActive="active">
            <mat-icon matListItemIcon>admin_panel_settings</mat-icon>
            <span matListItemTitle>Roles</span>
          </a>
          <a mat-list-item routerLink="/dashboard/users" routerLinkActive="active">
            <mat-icon matListItemIcon>people</mat-icon>
            <span matListItemTitle>Users</span>
          </a>
        }
        <!-- Logout -->
        <button mat-menu-item (click)="logout()" class="menu-item logout">
          <mat-icon class="item-icon">logout</mat-icon>
          <span class="item-text">Sign Out</span>
        </button>
      </mat-nav-list>
    </mat-sidenav>
  }

  <mat-sidenav-content>
    <app-navbar [(sidenavOpened)]="sidenavOpened" />

    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
