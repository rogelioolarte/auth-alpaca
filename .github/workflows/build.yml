name: Workflow for SonarQube

on:
  push:
    branches:
      - main
      - dev

    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'

  pull_request:
    branches:
      - main
      - dev

    types:
      - opened
      - synchronize
      - reopened

    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend - Java 25 + Spring Boot 4
    runs-on: ubuntu-latest

    timeout-minutes: 30

    defaults:
      run:
        working-directory: backend

    env:
      JAVA_VERSION: '25'

      MAVEN_OPTS: >-
        -Xms512m
        -Xmx2g
        -XX:+UseG1GC
        -Djava.awt.headless=true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Validate Maven Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Download dependencies
        run: |
          ./mvnw \
            -B \
            --no-transfer-progress \
            dependency:go-offline

      - name: Run tests and build
        run: |
          ./mvnw \
            -B \
            --no-transfer-progress \
            clean verify

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/**/target/surefire-reports/**
            backend/**/target/failsafe-reports/**

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco
          path: backend/**/target/site/jacoco/**

  frontend:
    name: Frontend - Angular 21
    runs-on: ubuntu-latest

    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Angular tests
        run: bun run test --watch=false --code-coverage

      - name: Build Angular application
        run: bun run build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/**

  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend

    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./backend/mvnw \
            -f backend/pom.xml \
            -B \
            --no-transfer-progress \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=rogelioolarte_auth-alpaca \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            -Dsonar.sources=backend/src,frontend/src \
            -Dsonar.tests=backend/src/test \
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info \
            -Dsonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml