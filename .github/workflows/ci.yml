name: Workflow for Codecov

on:
  push:
    branches: [main]
    paths:
      - 'auth-alpaca-api/**'
  pull_request:
    branches: [main]
    paths:
      - 'auth-alpaca-api/**'
  
concurrency:
  group: auth-alpaca-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auth-alpaca-api

    permissions:
      contents: read
      
    env:
      MAVEN_OPTS: >-
        -Xmx3g
        -XX:+UseG1GC
      TESTCONTAINERS_RYUK_DISABLED: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make scripts executable
        run: chmod +x ../generate_keys.sh

      - name: Run key generation script
        run: ../generate_keys.sh -L src/test/resources/keys

      - name: Build project and run tests with coverage
        run: mvn -B clean verify

      - name: Upload JaCoCo coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_ORG_TOKEN }}
          files: auth-alpaca-api/target/site/jacoco/jacoco.xml
          config_file: ../codecov.yml
          fail_ci_if_error: true
          verbose: true
