name: Workflow for Codecov auth-alpaca

on:
  push:
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make scripts executable
        run: chmod +x generate_keys_test.sh

      - name: Run key generation script
        run: ./generate_keys_test.sh

      - name: Build project and run tests with coverage
        run: mvn -B clean verify

      - name: Upload JaCoCo coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_ORG_TOKEN }}
          files: backend/target/jacoco-report/unit/jacoco.xml
          fail_ci_if_error: true
          verbose: true