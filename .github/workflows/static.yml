# Deploy Javadoc and static pages to GitHub Pages
name: Deploy Javadoc to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'auth-alpaca-api/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Generate Javadoc
        run: mvn -B javadoc:javadoc -q
        working-directory: auth-alpaca-api

      - name: Copy static pages into artifact
        run: |
          cp -r docs/privacy auth-alpaca-api/target/reports/apidocs/privacy
          cp -r docs/terms auth-alpaca-api/target/reports/apidocs/terms

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: auth-alpaca-api/target/reports/apidocs

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
