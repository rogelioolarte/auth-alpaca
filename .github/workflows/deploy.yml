name: Deploy Backend to OCI

on:
  push:
    branches: [ dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make script executable
        run: chmod +x ../generate_keys.sh

      - name: Generate Security Keys
        run: ../generate_keys.sh -L keys

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: |
            backend/target/*.jar
            backend/keys/*

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: deploy/

      - name: Deploy to OCI VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/*"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: Update Environment & Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Crear el .env si no existe o actualizarlo
            cat <<EOF > /home/ubuntu/app/.env
            SPRING_PROFILES_ACTIVE=prod
            SPRING_DATASOURCE_URL="${{secrets.SPRING_DATASOURCE_URL}}""
            SPRING_DATASOURCE_USERNAME=${{secrets.SPRING_DATASOURCE_USERNAME}}
            SPRING_DATASOURCE_PASSWORD=${{secrets.SPRING_DATASOURCE_PASSWORD}}
            SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=${{secrets.SPRING_DATASOURCE_MAXIMUM_POOL_SIZE}}
            SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=${{secrets.SPRING_DATASOURCE_MINIMUM_IDLE}}
            SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT=30000
            JWT_ISSUER=${{secrets.JWT_ISSUER}}
            JWT_ACCESS_TOKEN_EXPIRATION=${{secrets.JWT_ACCESS_TOKEN_EXPIRATION}}
            JWT_REFRESH_TOKEN_EXPIRATION=${{secrets.JWT_REFRESH_TOKEN_EXPIRATION}}
            JWT_ACCESS_PRIVATE_KEY_PATH=${{secrets.JWT_ACCESS_PRIVATE_KEY_PATH}}
            JWT_ACCESS_PUBLIC_KEY_PATH=${{secrets.JWT_ACCESS_PUBLIC_KEY_PATH}}
            JWT_REFRESH_PRIVATE_KEY_PATH=${{secrets.JWT_REFRESH_PRIVATE_KEY_PATH}}
            JWT_REFRESH_PUBLIC_KEY_PATH=${{secrets.JWT_REFRESH_PUBLIC_KEY_PATH}}
            ADMIN_EMAIL=${{secrets.ADMIN_EMAIL}}
            ADMIN_PASSWORD=${{secrets.ADMIN_PASSWORD}}
            APP_OAUTH2_REDIRECT_URI=${{secrets.APP_OAUTH2_REDIRECT_URI}}
            APP_FRONTEND_URI=${{secrets.APP_FRONTEND_URI}}
            GOOGLE_CLIENT_ID=${{secrets.GOOGLE_CLIENT_ID}}
            GOOGLE_CLIENT_SECRET=${{secrets.GOOGLE_CLIENT_SECRET}}
            MAX_SESSIONS_PER_USER=${{secrets.MAX_SESSIONS_PER_USER}}
            INFINITY_LOGIN=${{secrets.INFINITY_LOGIN}}
            BCRYPT_COST_FACTOR=${{secrets.BCRYPT_COST_FACTOR}}
            EOF
            
            chmod 600 /home/ubuntu/app/keys/*.pem
            
            sudo systemctl restart alpaca.service