name: Deploy Backend to OCI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make script executable
        run: chmod +x ../generate_keys.sh

      - name: Generate Security Keys
        run: ../generate_keys.sh -L keys

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: |
            backend/target/*.jar
            backend/keys/*

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: deploy/

      - name: Deploy to OCI VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/*"
          target: "/home/${{ secrets.VM_USER }}/app"
          strip_components: 1

      - name: Update Environment & Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            printf "SPRING_PROFILES_ACTIVE=prod\n" > /home/${{ secrets.VM_USER }}/app/.env
            printf "SPRING_DATASOURCE_URL=%s\n" "${{secrets.SPRING_DATASOURCE_URL}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "SPRING_DATASOURCE_USERNAME=%s\n" "${{secrets.SPRING_DATASOURCE_USERNAME}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "SPRING_DATASOURCE_PASSWORD=%s\n" "${{secrets.SPRING_DATASOURCE_PASSWORD}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=%s\n" "${{secrets.SPRING_DATASOURCE_MAXIMUM_POOL_SIZE}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=%s\n" "${{secrets.SPRING_DATASOURCE_MINIMUM_IDLE}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT=30000\n" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "JWT_ISSUER=%s\n" "${{secrets.JWT_ISSUER}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "JWT_ACCESS_TOKEN_EXPIRATION=%s\n" "${{secrets.JWT_ACCESS_TOKEN_EXPIRATION}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "JWT_REFRESH_TOKEN_EXPIRATION=%s\n" "${{secrets.JWT_REFRESH_TOKEN_EXPIRATION}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "JWT_ACCESS_PRIVATE_KEY_PATH=%s\n" "${{secrets.JWT_ACCESS_PRIVATE_KEY_PATH}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "JWT_ACCESS_PUBLIC_KEY_PATH=%s\n" "${{secrets.JWT_ACCESS_PUBLIC_KEY_PATH}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "JWT_REFRESH_PRIVATE_KEY_PATH=%s\n" "${{secrets.JWT_REFRESH_PRIVATE_KEY_PATH}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "JWT_REFRESH_PUBLIC_KEY_PATH=%s\n" "${{secrets.JWT_REFRESH_PUBLIC_KEY_PATH}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "ADMIN_EMAIL=%s\n" "${{secrets.ADMIN_EMAIL}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "ADMIN_PASSWORD=%s\n" "${{secrets.ADMIN_PASSWORD}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "APP_FRONTEND_URI=%s\n" "${{secrets.APP_FRONTEND_URI}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "GOOGLE_CLIENT_ID=%s\n" "${{secrets.GOOGLE_CLIENT_ID}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "GOOGLE_CLIENT_SECRET=%s\n" "${{secrets.GOOGLE_CLIENT_SECRET}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "MAX_SESSIONS_PER_USER=%s\n" "${{secrets.MAX_SESSIONS_PER_USER}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "INFINITY_LOGIN=%s\n" "${{secrets.INFINITY_LOGIN}}" >> /home/${{ secrets.VM_USER }}/app/.env
            printf "BCRYPT_COST_FACTOR=%s\n" "${{secrets.BCRYPT_COST_FACTOR}}" >> /home/${{ secrets.VM_USER }}/app/.env

            chmod 600 /home/${{ secrets.VM_USER }}/app/.env
            chmod 600 /home/${{ secrets.VM_USER }}/app/keys/*.pem
            
            sudo systemctl restart alpaca.service