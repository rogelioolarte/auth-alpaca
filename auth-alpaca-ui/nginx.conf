server {
    # We changed to 8080 to allow execution as a non-root user
    listen 8080;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # 1. GZIP COMPRESSION (Critical for Angular)
    # Reduces the size of JS/CSS files on a network by up to 70%
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # 2. BASIC SAFETY HEADBOARDS
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # 3. CACHING STRATEGY FOR STATIC FILES (JS, CSS, Images)
    # Angular generates files with hashes (e.g., main.d3b4b.js). These never change.
    # We tell the browser to save them for 1 year.
    location ~* \.(?:css|js|jpg|svg|png|ico|woff2?|eot|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off; # Do not overload the logs with image/CSS requests
    }

    # 4. SPA ROUTING AND CACHE FOR INDEX.HTML
    location / {
        try_files $uri $uri/ /index.html;
        
        # The index.html file should NEVER be cached.
        # This ensures that when you deploy a new version,
        # users immediately download the new index.html file that points to the new JS.
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Error Handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}