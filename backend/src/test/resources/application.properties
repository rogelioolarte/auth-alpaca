# ===============================
# PostgreSQL Database Configuration
# ===============================
spring.datasource.url= jdbc:h2:mem:test_db
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.secret.key=classpath:pass/secret.key
spring.datasource.driver-class-name=org.h2.Driver

# ===============================
# JPA and Hibernate Configuration
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# ===============================
# Configuring Application Metrics
# ===============================
# management.endpoints.web.exposure.include=*
# management.endpoint.metrics.enabled=true
# management.metrics.export.prometheus.enabled=true

# ===============================
# Password Security
# ===============================
security.password.argon2.memory=19456
security.password.argon2.iterations=2

# ===============================
# JWT - Access Token (RSA-4096)
# ===============================
security.jwt.access.private-key-path=classpath:keys/access_private.pem
security.jwt.access.public-key-path=classpath:keys/access_public.pem
# 5 minutes
security.jwt.access.expiration=300000

# ===============================
# JWT - Refresh Token (RSA-4096)
# ===============================
security.jwt.refresh.private-key-path=classpath:keys/refresh_private.pem
security.jwt.refresh.public-key-path=classpath:keys/refresh_public.pem
# 30 days
security.jwt.refresh.expiration=2592000000

# ===============================
# JWT - Common / Metadata
# ===============================
security.jwt.issuer=auth-alpaca-issuer

# ===============================
# Security JJWT - RefreshToken and Sessions
# ===============================
security.max.session.per.user=10
security.infinity.login=true

# ===============================
# OAuth2 / Frontend
# ===============================
app.oauth2.authorized-redirect-uri=http://localhost:4200/oauth2/redirect
app.frontend.uri=http://localhost:4200/login

# ===============================
# Google OAuth2 Configuration
# ===============================
spring.security.oauth2.client.registration.google.clientId=ID-CLIENT
spring.security.oauth2.client.registration.google.clientSecret=CLIENT-SECRET
spring.security.oauth2.client.registration.google.redirectUri={baseUrl}/oauth2/callback/{registrationId}
spring.security.oauth2.client.registration.google.scope=email, profile
